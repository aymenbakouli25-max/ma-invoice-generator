<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowManga Pro | عالم المانجا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #050505; color: white; }
        .manga-card:hover img { transform: scale(1.05); filter: brightness(0.8); }
        .reader-view { display: none; position: fixed; inset: 0; background: black; z-index: 100; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="home">
        <nav class="p-5 border-b border-white/5 sticky top-0 bg-black/80 backdrop-blur-md z-50 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 italic">SHADOW<span class="text-white">MANGA</span></h1>
            <div class="bg-white/5 px-4 py-2 rounded-full border border-white/10 text-xs">البحث عن مانهوا...</div>
        </nav>

        <main class="max-w-7xl mx-auto py-12 px-6">
            <h3 class="text-xl font-bold mb-8 border-r-4 border-blue-600 pr-4 italic">أحدث التحديثات من مانجا ليك 🔥</h3>
            <div id="manga-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                </div>
        </main>
    </div>

    <div id="reader" class="reader-view">
        <nav class="p-4 bg-black/90 border-b border-white/5 sticky top-0 flex justify-between items-center">
            <button onclick="closeReader()" class="text-xs bg-white/10 px-4 py-2 rounded-xl">إغلاق ✕</button>
            <div class="text-center">
                <h2 id="r-title" class="text-sm font-bold text-blue-500">اسم المانجا</h2>
                <p id="r-chap" class="text-[10px] text-slate-500">الفصل الحالي</p>
            </div>
            <button class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">التالي</button>
        </nav>
        <div id="pages-list" class="max-w-3xl mx-auto flex flex-col gap-1 pt-4">
            </div>
    </div>

    <script>
        // مصفوفة تجريبية (سيتم تعويضها ببيانات السكربت لاحقاً)
        const demoData = [
            { title: "One Piece", cover: "https://m.media-amazon.com/images/I/81S6o30V9VL.jpg", chapter: "1111", pages: ["https://images.shonenjump.com/7-1/1.jpg"] }
        ];

        function renderManga(data) {
            const grid = document.getElementById('manga-grid');
            grid.innerHTML = data.map(m => `
                <div class="manga-card cursor-pointer group" onclick="openReader('${m.title}', '${m.chapter}')">
                    <div class="relative aspect-[3/4] overflow-hidden rounded-2xl border border-white/5">
                        <img src="${m.cover}" class="w-full h-full object-cover transition-all duration-500">
                        <div class="absolute bottom-2 right-2 bg-blue-600 px-2 py-1 rounded-lg text-[10px] font-black italic">Ch. ${m.chapter}</div>
                    </div>
                    <h4 class="mt-3 font-bold text-sm truncate">${m.title}</h4>
                </div>
            `).join('');
        }

        function openReader(title, chapter) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            document.getElementById('r-title').innerText = title;
            document.getElementById('r-chap').innerText = "الفصل " + chapter;
            // هنا يتم تحميل الصور
        }

        function closeReader() {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('home').style.display = 'block';
        }

        renderManga(demoData);
    </script>
</body>
</html>

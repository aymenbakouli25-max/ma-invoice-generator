<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowManga | عالم المانجا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #050505; color: white; }
        .manga-card:hover img { transform: scale(1.1); filter: brightness(0.7); }
        .loader { border-top-color: #2563eb; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-4 border-b border-white/5 sticky top-0 bg-black/95 backdrop-blur-md z-50 flex justify-between items-center shadow-xl">
        <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">SHADOW<span class="text-white font-light">MANGA</span></h1>
        <div class="flex-1 max-w-md mx-6">
            <input type="text" id="search-input" placeholder="ابحث عن مانهوا..." class="w-full bg-white/5 border border-white/10 px-5 py-2.5 rounded-2xl text-sm outline-none focus:ring-2 ring-blue-600 transition-all">
        </div>
        <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-xl text-xs font-bold transition-all shadow-lg shadow-blue-600/20">دخول</button>
    </nav>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-2 h-8 bg-blue-600 rounded-full"></div>
            <h3 class="text-xl font-black italic">أحدث الفصول المستخرجة 🔥</h3>
        </div>

        <div id="loading" class="flex justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-900 h-12 w-12"></div>
        </div>

        <div id="manga-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-8">
            </div>

        <div id="no-results" class="hidden text-center py-20 opacity-50">
            <p class="text-lg">لم يتم العثور على نتائج.. تأكد من تشغيل الـ Scraper</p>
        </div>
    </main>

    <div id="reader" class="fixed inset-0 bg-black z-[100] hidden overflow-y-auto">
        <div class="sticky top-0 bg-black/90 p-4 border-b border-white/10 flex justify-between items-center">
            <button onclick="closeReader()" class="bg-white/10 px-5 py-2 rounded-xl text-xs hover:bg-white/20">إغلاق ✕</button>
            <h2 id="r-title" class="text-sm font-bold text-blue-500 truncate px-4">---</h2>
            <div class="w-10"></div>
        </div>
        <div id="pages-list" class="max-w-3xl mx-auto flex flex-col items-center pt-4 pb-20 space-y-1">
            </div>
    </div>

    <script>
        // مفاتيحك الخاصة من Supabase
        const SB_URL = 'https://dsjxjvyjscoxgnjhmnjf.supabase.co';
        const SB_KEY = 'sb_publishable_x2I_R1S08SV5FNIpe_otAQ_5zfDCX_z9n5X9H6A4_D8';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // وظيفة جلب البيانات وعرضها
        async function loadManga(query = '') {
            document.getElementById('loading').classList.remove('hidden');
            
            let request = _supabase.from('manga').select('*').order('updated_at', { ascending: false });
            
            if(query) {
                request = request.ilike('title', `%${query}%`);
            }
            
            const { data, error } = await request;

            document.getElementById('loading').classList.add('hidden');

            if (error) {
                console.error("خطأ في جلب البيانات:", error);
                return;
            }

            const grid = document.getElementById('manga-grid');
            if (data.length === 0) {
                document.getElementById('no-results').classList.remove('hidden');
                grid.innerHTML = '';
            } else {
                document.getElementById('no-results').classList.add('hidden');
                grid.innerHTML = data.map(m => {
                    // تصحيح رابط الصورة إذا كان بروتوكول HTTP
                    let secureCover = m.cover_url ? m.cover_url.replace('http://', 'https://') : 'https://via.placeholder.com/300x450';
                    
                    return `
                    <div class="manga-card cursor-pointer group flex flex-col" onclick="openReader('${m.title.replace(/'/g, "\\'")}', '${m.images_json ? m.images_json.replace(/'/g, "\\'") : '[]'}')">
                        <div class="relative aspect-[3/4.5] overflow-hidden rounded-2xl border border-white/5 shadow-2xl">
                            <img src="${secureCover}" loading="lazy" class="w-full h-full object-cover transition-all duration-700">
                            <div class="absolute bottom-3 right-3 bg-blue-600 px-3 py-1.5 rounded-xl text-[10px] font-black italic shadow-lg">Ch. ${m.latest_chapter || '??'}</div>
                        </div>
                        <h4 class="mt-4 font-bold text-sm truncate text-slate-100 group-hover:text-blue-500 transition-colors">${m.title}</h4>
                    </div>
                `}).join('');
            }
        }

        // فتح القارئ
        function openReader(title, imagesJson) {
            const reader = document.getElementById('reader');
            const list = document.getElementById('pages-list');
            
            reader.classList.remove('hidden');
            document.getElementById('r-title').innerText = title;
            document.body.style.overflow = 'hidden'; // منع السكرول في الخلفية
            
            list.innerHTML = '<div class="py-20 text-blue-500 animate-pulse">جاري تحميل الصفحات...</div>';
            
            try {
                const images = JSON.parse(imagesJson);
                if (images.length === 0) {
                    list.innerHTML = '<p class="py-20 opacity-50">لا توجد صفحات متوفرة حالياً لهذا الفصل.</p>';
                    return;
                }

                list.innerHTML = '';
                images.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src.replace('http://', 'https://');
                    img.className = "w-full h-auto shadow-2xl";
                    img.loading = "lazy";
                    list.appendChild(img);
                });
            } catch(e) {
                list.innerHTML = '<p class="py-20 text-red-500">حدث خطأ أثناء عرض الصفحات.</p>';
            }
        }

        function closeReader() {
            document.getElementById('reader').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // البحث اللحظي
        let timeout = null;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => loadManga(e.target.value), 500);
        });

        // تشغيل الجلب عند فتح الصفحة
        loadManga();
    </script>
</body>
</html>

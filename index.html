
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowCode Elite | المنصة المتكاملة للمقاول الذاتي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        :root { --main-color: #0f172a; }
        .bg-selected { background-color: var(--main-color) !important; color: white !important; }
        .text-selected { color: var(--main-color) !important; }
        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b p-4 sticky top-0 z-50 no-print flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-2xl bg-slate-900 text-white p-2 rounded-lg font-black">S</span>
            <h1 class="text-xl font-black">SHADOW<span class="text-blue-600">CODE</span> ELITE</h1>
        </div>
        <div class="flex gap-4">
            <button onclick="changeLang('ar')" class="font-bold text-xs">AR</button>
            <button onclick="changeLang('fr')" class="font-bold text-xs">FR</button>
            <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm shadow-lg hover:bg-blue-700 transition">إصدار PDF</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 space-y-6 no-print">
            <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                <h2 class="text-lg font-bold mb-6 border-b pb-4">🛠️ إعدادات متقدمة</h2>
                
                <div class="space-y-4">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">شعار المقاولة:</label>
                    <input type="file" id="logo-input" accept="image/*" onchange="loadLogo(event)" class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    
                    <input type="text" id="in-name" oninput="livePreview()" placeholder="اسم المقاول / الشركة" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="in-client" oninput="livePreview()" placeholder="اسم الزبون" class="w-full p-3 border rounded-xl outline-none">
                    
                    <div class="pt-6 border-t">
                        <h3 class="font-bold mb-4 text-blue-600">📦 الخدمات/المنتجات:</h3>
                        <div id="items-inputs" class="space-y-3">
                            <div class="flex gap-2">
                                <input type="text" placeholder="الخدمة" class="item-desc w-2/3 p-2 border rounded-lg text-sm">
                                <input type="number" placeholder="السعر" class="item-price w-1/3 p-2 border rounded-lg text-sm" oninput="calculateAll()">
                            </div>
                        </div>
                        <button onclick="addItem()" class="mt-4 text-xs font-bold text-blue-600 underline">+ إضافة خدمة أخرى</button>
                    </div>
                </div>
            </div>
        </aside>

        <div class="lg:col-span-8">
            <div id="invoice-template" class="bg-white p-16 shadow-2xl min-h-[1050px] relative rounded-sm">
                
                <div class="flex justify-between items-start mb-20 border-b-2 border-slate-900 pb-10">
                    <div>
                        <h1 id="txt-title" class="text-6xl font-black text-slate-950 mb-2">فاتورة</h1>
                        <p class="text-sm font-bold text-slate-400" id="out-inv-num">INV-2026-000</p>
                    </div>
                    <img id="out-logo" src="https://via.placeholder.com/100x100?text=LOGO" class="h-24 w-24 object-contain rounded-xl">
                </div>

                <div class="grid grid-cols-2 gap-20 mb-20">
                    <div>
                        <h4 id="txt-from" class="text-[10px] font-black text-slate-300 uppercase mb-2">من المقاول:</h4>
                        <p id="out-name" class="text-2xl font-black text-slate-900 uppercase">اسمك هنا</p>
                    </div>
                    <div class="text-left">
                        <h4 id="txt-to" class="text-[10px] font-black text-slate-300 uppercase mb-2">إلى الزبون:</h4>
                        <p id="out-client" class="text-2xl font-black text-slate-900 underline decoration-slate-200">اسم الزبون هنا</p>
                    </div>
                </div>

                <table class="w-full mb-20">
                    <thead>
                        <tr class="bg-slate-950 text-white text-xs uppercase font-black">
                            <th class="p-4 text-right" id="txt-desc">الوصف</th>
                            <th class="p-4 text-left" id="txt-total-head">المبلغ</th>
                        </tr>
                    </thead>
                    <tbody id="out-items-list" class="text-lg">
                        </tbody>
                </table>

                <div class="flex justify-end mt-20">
                    <div class="w-80 bg-slate-950 text-white p-10 rounded-3xl shadow-2xl">
                        <p class="text-[10px] font-black opacity-50 uppercase mb-2" id="txt-final-total">المجموع الإجمالي</p>
                        <h2 class="text-4xl font-black"><span id="out-total">0.00</span> <small class="text-sm">د.م</small></h2>
                    </div>
                </div>

                <div class="mt-20 p-4 border-2 border-dashed border-slate-100 rounded-2xl">
                    <p class="text-xs font-bold text-slate-400 mb-1 italic" id="txt-words">المبلغ بالحروف:</p>
                    <p id="out-words" class="text-sm font-black text-slate-900">صفر درهم لا غير</p>
                </div>

                <div class="absolute bottom-10 left-10 right-10 text-[8px] text-slate-300 font-bold border-t pt-4 flex justify-between">
                    <span>Generated by ShadowCode Elite v4.0</span>
                    <span>Document ID: <span id="doc-id"></span></span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function addItem() {
            const container = document.getElementById('items-inputs');
            const div = document.createElement('div');
            div.className = 'flex gap-2 animate-fade';
            div.innerHTML = `<input type="text" placeholder="الخدمة" class="item-desc w-2/3 p-2 border rounded-lg text-sm" oninput="calculateAll()">
                             <input type="number" placeholder="السعر" class="item-price w-1/3 p-2 border rounded-lg text-sm" oninput="calculateAll()">`;
            container.appendChild(div);
        }

        function calculateAll() {
            const descs = document.querySelectorAll('.item-desc');
            const prices = document.querySelectorAll('.item-price');
            const list = document.getElementById('out-items-list');
            let total = 0;
            list.innerHTML = '';

            descs.forEach((d, i) => {
                const price = parseFloat(prices[i].value) || 0;
                if(d.value || price > 0) {
                    total += price;
                    list.innerHTML += `<tr class="border-b border-slate-100"><td class="p-4 font-bold text-slate-700">${d.value || 'خدمة'}</td><td class="p-4 text-left font-black">${price.toFixed(2)} د.م</td></tr>`;
                }
            });

            document.getElementById('out-total').innerText = total.toLocaleString('fr-MA', {minimumFractionDigits: 2});
            document.getElementById('out-words').innerText = total > 0 ? (total + " درهم مغربي") : "صفر درهم";
            livePreview();
        }

        function loadLogo(event) {
            const output = document.getElementById('out-logo');
            output.src = URL.createObjectURL(event.target.files[0]);
        }

        function livePreview() {
            document.getElementById('out-name').innerText = document.getElementById('in-name').value || 'اسمك هنا';
            document.getElementById('out-client').innerText = document.getElementById('in-client').value || 'اسم الزبون هنا';
        }

        function changeLang(lang) {
            const isFr = lang === 'fr';
            document.documentElement.dir = isFr ? 'ltr' : 'rtl';
            const t = isFr ? {title: "FACTURE", from: "De:", to: "À:", desc: "Description", total: "Total", final: "NET À PAYER"} : {title: "فاتورة", from: "من المقاول:", to: "إلى الزبون:", desc: "الوصف", total: "المبلغ", final: "المجموع الإجمالي"};
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-from').innerText = t.from;
            document.getElementById('txt-to').innerText = t.to;
            document.getElementById('txt-desc').innerText = t.desc;
            document.getElementById('txt-total-head').innerText = t.total;
            document.getElementById('txt-final-total').innerText = t.final;
        }

        window.onload = () => {
            document.getElementById('doc-id').innerText = Math.random().toString(36).substring(7).toUpperCase();
            document.getElementById('out-inv-num').innerText = 'INV-2026-' + Math.floor(1000 + Math.random() * 9000);
            calculateAll();
        }
    </script>
</body>
</html>

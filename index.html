<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowManga | عالم المانجا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #050505; color: white; }
        .manga-card:hover img { transform: scale(1.05); filter: brightness(0.8); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-4 border-b border-white/5 sticky top-0 bg-black/95 backdrop-blur-md z-50 flex justify-between items-center shadow-xl">
        <h1 class="text-2xl font-black text-blue-600 italic">SHADOW<span class="text-white font-light">MANGA</span></h1>
        <div class="flex-1 max-w-md mx-6">
            <input type="text" id="search-input" placeholder="ابحث عن مانهوا..." class="w-full bg-white/5 border border-white/10 px-5 py-2.5 rounded-2xl text-sm outline-none focus:ring-2 ring-blue-600 transition-all">
        </div>
        <button id="login-btn" class="bg-blue-600 px-6 py-2 rounded-xl text-xs font-bold shadow-lg">دخول</button>
    </nav>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-2 h-8 bg-blue-600 rounded-full"></div>
            <h3 class="text-xl font-black italic">أحدث الفصول المستخرجة 🔥</h3>
        </div>

        <div id="loading" class="flex justify-center py-20 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>

        <div id="manga-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8">
            </div>
    </main>

    <div id="reader" class="fixed inset-0 bg-black z-[100] hidden overflow-y-auto">
        <div class="sticky top-0 bg-black/90 p-4 border-b border-white/10 flex justify-between items-center">
            <button onclick="closeReader()" class="bg-white/10 px-5 py-2 rounded-xl text-xs">إغلاق ✕</button>
            <h2 id="r-title" class="text-sm font-bold text-blue-500">جاري التحميل...</h2>
            <div class="w-10"></div>
        </div>
        <div id="pages-list" class="max-w-3xl mx-auto flex flex-col items-center pt-4 pb-20"></div>
    </div>

    <script>
        // ربط مشروعك الفعلي (aymenbakouli25-max's Project)
        const SB_URL = 'https://dsjxjvyjscoxgnjhmnjf.supabase.co';
        const SB_KEY = 'sb_publishable_x2I_R1S08SV5FNIpe_otAQ_5zfDCX_z9n5X9H6A4_D8';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadManga(query = '') {
            document.getElementById('loading').classList.remove('hidden');
            let request = _supabase.from('manga').select('*').order('updated_at', { ascending: false });
            if(query) request = request.ilike('title', `%${query}%`);
            
            const { data, error } = await request;
            document.getElementById('loading').classList.add('hidden');

            if (error) { console.error("Error:", error); return; }

            const grid = document.getElementById('manga-grid');
            grid.innerHTML = data.map(m => `
                <div class="manga-card cursor-pointer group flex flex-col" onclick="openReader('${m.title.replace(/'/g, "\\'")}', '${m.images_json ? m.images_json.replace(/'/g, "\\'") : '[]'}')">
                    <div class="relative aspect-[3/4.5] overflow-hidden rounded-2xl border border-white/5 shadow-2xl">
                        <img src="${m.cover_url}" class="w-full h-full object-cover transition-all duration-700">
                        <div class="absolute bottom-3 right-3 bg-blue-600 px-3 py-1.5 rounded-xl text-[10px] font-black shadow-lg italic">Ch. ${m.latest_chapter || '??'}</div>
                    </div>
                    <h4 class="mt-4 font-bold text-sm truncate text-slate-100">${m.title}</h4>
                </div>
            `).join('');
        }

        function openReader(title, imagesJson) {
            const reader = document.getElementById('reader');
            const list = document.getElementById('pages-list');
            reader.classList.remove('hidden');
            document.getElementById('r-title').innerText = title;
            document.body.style.overflow = 'hidden';
            
            try {
                const images = JSON.parse(imagesJson);
                list.innerHTML = images.map(src => `<img src="${src}" class="w-full h-auto mb-1" loading="lazy">`).join('');
            } catch(e) { list.innerHTML = '<p class="py-20 opacity-50">لا توجد صفحات حالياً</p>'; }
        }

        function closeReader() {
            document.getElementById('reader').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('search-input').addEventListener('input', (e) => loadManga(e.target.value));
        loadManga();
    </script>
</body>
</html>
